<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Live Test Rig</title>
  <style>
    body{
      font-family: sans-serif;
      padding: 20px;
      background: #121212 ;
      color: #fff;
    }
    #log {
      background: #000 ;
      padding: 10px;
      height: 300px;
      overflow-y: scroll;
      border: 1px solid #333;
    }
    .status-on{color: #00ff00;}
    .status-off{color: #ff0000;}
  </style>
</head>
<body>
  <h1>Websocket Broadcast Console</h1>
  <p id="status" class="status-off">Connecting ...</p>
  <form id="message-form">
    <input type="text" id="message-input" placeholder="send cargo ..." required>
    <button type="submit">Deploy message</button>
  </form>

  <h3>Live stream Logs : </h3>
  <pre id="log"></pre>
  <script>
    const statusEl = document.getElementById("status")
    const log =  document.getElementById("log")
    const input = document.getElementById("message-input")

    //  1 initiate handshake 
    const socket = new WebSocket('ws://localhost:8080');
    const appendLog = (label,message)=>{
      const entry = `${new Date().toLocaleTimeString()}
      ${label} ${message}\n`
      log.textContent = entry + log.textContent;
    }
    socket.addEventListener('open',()=>{
      statusEl.textContent = 'Connected: ws://localhost:8080'
      statusEl.classList = "status-on"
      appendLog('[System]','Tunnel Established')
    })
    socket.addEventListener('close', () => {
        statusEl.textContent = 'Disconnected'
        statusEl.classList = "status-off"
        appendLog('[System]', 'Tunnel Collapsed')
      })

    socket.addEventListener('message',(e)=>{
      appendLog(['Recieved'],e.data);
    })

    document.getElementById('message-form').addEventListener('submit',(e)=>{
      e.preventDefault();
      if(socket.readyState !== 1){
        appendLog('[ERROR]','No active tunnel found')
      }
      const msg = input.value.trim();
      socket.send(msg)
      appendLog('[SENT]',msg)
      input.value = '';
    })
  </script>
</body>
</html>
